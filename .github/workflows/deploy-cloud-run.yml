name: Deploy to Cloud Run

on:
  workflow_dispatch:

jobs:
  deploy-cloud-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      IMAGE_URI: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}/product-discover-agent:${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker authentication for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t "$IMAGE_URI" .

      - name: Push Docker image
        run: docker push "$IMAGE_URI"

      - name: Compute Cloud Run database deployment flags
        id: deploy-config
        shell: bash
        env:
          DATABASE_BACKEND_INPUT: ${{ vars.DATABASE_BACKEND }}
          CLOUD_SQL_CONNECTION_NAME: ${{ vars.CLOUD_SQL_CONNECTION_NAME }}
          DATABASE_SECRET_NAME: ${{ vars.DATABASE_SECRET_NAME }}
        run: |
          set -euo pipefail

          DATABASE_BACKEND="${DATABASE_BACKEND_INPUT:-}"
          DATABASE_BACKEND="${DATABASE_BACKEND,,}"
          DATABASE_BACKEND="${DATABASE_BACKEND//[[:space:]]/}"

          if [[ -z "$DATABASE_BACKEND" || "$DATABASE_BACKEND" == "sqlite" ]]; then
            DEPLOY_ENV_VARS="APP_NAME=product-discover-agent,ENVIRONMENT=production,LOG_LEVEL=INFO,DATABASE_BACKEND=sqlite,DATABASE_PATH=/tmp/product_discover_agent.db"
            CLOUD_SQL_FLAGS=""
            SECRET_FLAGS=""
          elif [[ "$DATABASE_BACKEND" == "postgres" ]]; then
            if [[ -z "${CLOUD_SQL_CONNECTION_NAME:-}" ]]; then
              echo "Error: CLOUD_SQL_CONNECTION_NAME must be set when DATABASE_BACKEND=postgres." >&2
              exit 1
            fi

            if [[ -z "${DATABASE_SECRET_NAME:-}" ]]; then
              echo "Error: DATABASE_SECRET_NAME must be set when DATABASE_BACKEND=postgres." >&2
              exit 1
            fi

            DEPLOY_ENV_VARS="APP_NAME=product-discover-agent,ENVIRONMENT=production,LOG_LEVEL=INFO,DATABASE_BACKEND=postgres"
            CLOUD_SQL_FLAGS="--add-cloudsql-instances=${CLOUD_SQL_CONNECTION_NAME}"
            SECRET_FLAGS="--set-secrets=DATABASE_URL=${DATABASE_SECRET_NAME}:latest"
          else
            echo "Error: DATABASE_BACKEND must be one of: sqlite, postgres. Received: '${DATABASE_BACKEND_INPUT}'." >&2
            exit 1
          fi

          echo "deploy_env_vars=${DEPLOY_ENV_VARS}" >> "$GITHUB_OUTPUT"
          echo "cloud_sql_flags=${CLOUD_SQL_FLAGS}" >> "$GITHUB_OUTPUT"
          echo "secret_flags=${SECRET_FLAGS}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image "$IMAGE_URI" \
            --region "${{ vars.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --max-instances=1 \
            --set-env-vars "${{ steps.deploy-config.outputs.deploy_env_vars }}" \
            ${{ steps.deploy-config.outputs.cloud_sql_flags }} \
            ${{ steps.deploy-config.outputs.secret_flags }}
          # Note: --max-instances=1 remains for demo-safety; PostgreSQL production can scale above 1 after load testing.
